<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <linearGradient id="automawow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B9FC" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Start state arrow indicator -->
  <path d="M 4 20 L 9 20" stroke="url(#automawow-grad)" stroke-width="3" stroke-linecap="round" />
  <path d="M 7 17 L 10 20 L 7 23" stroke="url(#automawow-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Transition Edges (the W shape) -->
  <path d="M 14 20 L 23 44 L 32 20 L 41 44 L 50 20" 
        stroke="url(#automawow-grad)" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />

  <!-- State Nodes -->
  <!-- q0 -->
  <circle cx="14" cy="20" r="5.5" fill="#FFFFFF" stroke="url(#automawow-grad)" stroke-width="3" />
  
  <!-- q1 -->
  <circle cx="23" cy="44" r="5.5" fill="#FFFFFF" stroke="url(#automawow-grad)" stroke-width="3" />
  
  <!-- q2 -->
  <circle cx="32" cy="20" r="5.5" fill="#FFFFFF" stroke="url(#automawow-grad)" stroke-width="3" />
  
  <!-- q3 -->
  <circle cx="41" cy="44" r="5.5" fill="#FFFFFF" stroke="url(#automawow-grad)" stroke-width="3" />
  
  <!-- q4 (Double Circle / Accepting State) -->
  <circle cx="50" cy="20" r="7" fill="none" stroke="url(#automawow-grad)" stroke-width="2" />
  <circle cx="50" cy="20" r="3.5" fill="#FFFFFF" stroke="url(#automawow-grad)" stroke-width="2.5" />
</svg>